<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSI DPDP CMS - Interactive Voice Consent</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tsi-primary: #006A67; }
        body { background-color: #f4fbf9; font-family: ui-sans-serif, system-ui, sans-serif; }
        
        .mic-btn { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .recording { background-color: #ef4444 !important; }
        
        /* High-Sensitivity Visual Feedback */
        .mic-pulse {
            position: absolute; inset: -8px; border-radius: 50%;
            border: 4px solid #ef4444; opacity: 0;
            pointer-events: none;
        }
        .recording .mic-pulse { animation: ripple 1.5s infinite; }
        
        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .progress-fill { height: 100%; background: var(--tsi-primary); transition: width 0.6s ease; }
        .notice-fade { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 40px; border-radius: 32px; width: 450px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-slate-900">

    <!-- SETUP MODAL: API set karne ke liye -->
    <div id="setup-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-2xl font-black text-teal-800 mb-2">Voice Gateway Setup</h2>
            <p class="text-sm text-slate-500 mb-8">Sarvam AI aur CMS Registry se connect karein.</p>
            
            <div class="space-y-4 mb-8">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">CMS API Key</label>
                    <input type="text" id="cms-key" class="w-full p-3 border rounded-xl text-sm font-mono mt-1" placeholder="API Key">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">CMS API Secret</label>
                    <input type="password" id="cms-secret" class="w-full p-3 border rounded-xl text-sm font-mono mt-1" placeholder="Secret">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Policy ID</label>
                    <input type="text" id="policy-id" class="w-full p-3 border rounded-xl text-sm mt-1" placeholder="e.g. VARAM_MICRO_V1">
                </div>
                <div class="pt-4 border-t">
                    <label class="text-[10px] font-black text-teal-600 uppercase tracking-widest">Sarvam API Key</label>
                    <input type="password" id="sarvam-key" class="w-full p-3 border border-teal-100 bg-teal-50/30 rounded-xl text-sm font-mono mt-1" placeholder="Subscription Key">
                </div>
            </div>

            <button onclick="initializeVoiceTour()" class="w-full py-4 bg-[#006A67] text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl transition-all active:scale-95">Voice Interaction Shuru Karein</button>
        </div>
    </div>

    <!-- MAIN UI -->
    <div id="interaction-ui" class="max-w-md w-full bg-white rounded-[48px] shadow-2xl p-10 text-center border border-slate-100 relative overflow-hidden hidden">
        <header class="mb-10">
            <div class="flex justify-between items-center mb-6">
                <span id="step-indicator" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Initialising...</span>
                <div class="w-24 h-1 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
                </div>
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Voice Affirmation</h1>
            <p id="sub-status" class="text-[10px] font-bold text-teal-600 uppercase tracking-widest mt-2 tracking-[0.2em]">Robust Echo-Free Mode</p>
        </header>

        <div id="notice-box" class="notice-fade bg-slate-50 p-8 rounded-[32px] mb-10 text-left border border-slate-100 min-h-[160px] flex flex-col justify-center text-center transition-all">
            <p id="purpose-name" class="text-[10px] font-black text-teal-600 uppercase tracking-widest mb-3 italic">---</p>
            <p id="purpose-desc" class="text-sm text-slate-700 leading-relaxed font-bold italic">Syncing Registry...</p>
        </div>

        <div id="interaction-controls" class="flex flex-col items-center gap-6">
            <div id="mic-container" class="flex flex-col items-center gap-4">
                <button id="mic-trigger" disabled class="mic-btn bg-[#006A67] text-white shadow-xl outline-none transition-all">
                    <div class="mic-pulse"></div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/>
                    </svg>
                </button>
                <div class="text-center min-h-[40px]">
                    <p id="status-label" class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic">Wait for Audio</p>
                    <p id="transcript-preview" class="text-xs text-teal-600 font-bold mt-2 italic h-4 min-w-[240px]"></p>
                </div>
            </div>
        </div>

        <!-- Completion Screen Overlay -->
        <div id="completion-screen" class="hidden absolute inset-0 bg-white z-50 flex flex-col items-center justify-center p-10 animate-in fade-in duration-500">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2 tracking-tight">Registry Synced</h2>
            <p class="text-xs text-slate-500 mb-8 leading-relaxed px-6">Every purpose has been presented and acknowledged via voice. Lifecycle artifacts recorded successfully.</p>
            <button onclick="location.reload()" class="w-full py-4 bg-[#006A67] text-white rounded-2xl font-bold uppercase tracking-widest text-xs shadow-lg">Return to Dashboard</button>
        </div>
    </div>

    <script>
        let config = { cmsKey: '', cmsSecret: '', policyId: '', sarvamKey: '', apiBase: 'http://localhost:8080' };
        let allPurposes = [];
        let currentIndex = 0;
        let responses = {};
        let currentAudio = null;
        let recognition = null;
        let sessionState = 'IDLE'; // IDLE, SPEAKING, LISTENING, PROCESSING

        const micBtn = document.getElementById('mic-trigger');
        const statusLabel = document.getElementById('status-label');
        const transcriptPreview = document.getElementById('transcript-preview');
        const stepIndicator = document.getElementById('step-indicator');
        const progressFill = document.getElementById('progress-fill');
        const purposeNameEl = document.getElementById('purpose-name');
        const purposeDescEl = document.getElementById('purpose-desc');
        const subStatus = document.getElementById('sub-status');
        
        // Setup Web Speech Recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            // REFINED: Set continuous to false for clearer "turn-based" interaction
            recognition.continuous = false; 
            recognition.interimResults = true; 
            recognition.lang = 'en-IN'; 

            recognition.onresult = (event) => {
                if (sessionState !== 'LISTENING') return;
                
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const text = event.results[i][0].transcript.toLowerCase();
                    if (event.results[i].isFinal) {
                        handleSpeechAffirmation(text);
                    } else {
                        interimTranscript += text;
                        transcriptPreview.textContent = `"${interimTranscript}..."`;
                        // Responsive matching
                        if (checkKeywords(interimTranscript)) {
                            handleSpeechAffirmation(interimTranscript);
                        }
                    }
                }
            };

            recognition.onend = () => {
                micBtn.classList.remove('recording');
                // Re-start ONLY if we are still waiting for an answer and haven't matched yet
                if (sessionState === 'LISTENING') {
                    statusLabel.textContent = "Listening (speak now)...";
                    setTimeout(() => {
                        if (sessionState === 'LISTENING') {
                            try { recognition.start(); micBtn.classList.add('recording'); } catch(e) {}
                        }
                    }, 400);
                }
            };

            recognition.onerror = (e) => {
                if (e.error !== 'no-speech') console.warn("STT Engine Error:", e.error);
            };
        }

        async function initializeVoiceTour() {
            config.cmsKey = document.getElementById('cms-key').value.trim();
            config.cmsSecret = document.getElementById('cms-secret').value.trim();
            config.policyId = document.getElementById('policy-id').value.trim();
            config.sarvamKey = document.getElementById('sarvam-key').value.trim();

            if(!config.cmsKey || !config.policyId) return alert("API Key and Policy ID are required.");

            document.getElementById('setup-modal').style.display = 'none';
            document.getElementById('interaction-ui').classList.remove('hidden');

            await fetchPolicyAndStart();
        }

        async function fetchPolicyAndStart() {
            try {
                const res = await fetch(`${config.apiBase}/api/v1/client/policy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': config.cmsKey, 'X-API-Secret': config.cmsSecret },
                    body: JSON.stringify({ "_func": "get_policy", "policy_id": config.policyId })
                });
                const data = await res.json();
                const content = typeof data.policy_content === 'string' ? JSON.parse(data.policy_content) : data.policy_content;
                const lang = Object.keys(content)[0];
                allPurposes = content[lang].data_processing_purposes;

                if(!allPurposes || allPurposes.length === 0) return alert("No purposes found.");
                
                runPurposeLoop();
            } catch (e) { alert("Registry connection failed."); }
        }

        /**
         * Main Interaction Logic
         * Strict separation between Speaking and Listening to eliminate echo.
         */
        async function runPurposeLoop() {
            if (currentIndex >= allPurposes.length) {
                sessionState = 'PROCESSING';
                await finishInteraction();
                return;
            }

            // 1. KILL ALL ACTIVE INPUTS
            sessionState = 'SPEAKING';
            try { recognition.abort(); } catch(e) {}
            micBtn.classList.remove('recording');
            micBtn.disabled = true;
            transcriptPreview.textContent = "";

            const p = allPurposes[currentIndex];
            const isMandatory = p.is_mandatory_for_service;
            
            updateUI(p);
            
            statusLabel.textContent = "System Speaking...";
            const speechText = isMandatory 
                ? `Purpose: ${p.name}. ${p.description}. This is mandatory. Say YES to acknowledge.`
                : `Purpose: ${p.name}. ${p.description}. Say YES or NO.`;

            // 2. Play Audio and WAIT for complete silence
            await speakPurpose(speechText);

            // 3. SECURE COOLDOWN (prevents echo capture)
            await new Promise(r => setTimeout(r, 600));

            // 4. ACTIVATE MICROPHONE
            sessionState = 'LISTENING';
            statusLabel.textContent = "Listening (Speak Now)...";
            micBtn.classList.add('recording');
            micBtn.disabled = false;
            try { recognition.start(); } catch(e) {}
        }

        function updateUI(p) {
            purposeNameEl.textContent = p.is_mandatory_for_service ? `[MANDATORY] ${p.name}` : p.name;
            purposeDescEl.textContent = `"${p.description}"`;
            stepIndicator.textContent = `Purpose ${currentIndex + 1} of ${allPurposes.length}`;
            progressFill.style.width = `${((currentIndex + 1) / allPurposes.length) * 100}%`;
            
            purposeNameEl.className = p.is_mandatory_for_service 
                ? "text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-3 italic"
                : "text-[10px] font-black text-teal-600 uppercase tracking-widest mb-3 italic";
        }

        async function speakPurpose(text) {
            if (!config.sarvamKey) return new Promise(r => setTimeout(r, 2000));
            try {
                const response = await fetch("https://api.sarvam.ai/text-to-speech", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "api-subscription-key": config.sarvamKey },
                    body: JSON.stringify({
                        inputs: [text],
                        target_language_code: "en-IN",
                        speaker: "vidya",
                        speech_sample_rate: 16000,
                        model: "bulbul:v2"
                    })
                });

                const data = await response.json();
                if(data.audios && data.audios[0]) {
                    if (currentAudio) currentAudio.pause();
                    const audioSrc = "data:audio/wav;base64," + data.audios[0];
                    currentAudio = new Audio(audioSrc);
                    return new Promise((resolve) => {
                        currentAudio.onended = () => resolve();
                        currentAudio.onerror = () => resolve();
                        currentAudio.play().catch(() => resolve());
                    });
                }
            } catch (e) { console.error("TTS Error:", e); }
            return new Promise(r => setTimeout(r, 1500));
        }

        function checkKeywords(text) {
            const t = text.toLowerCase();
            return t.includes("yes") || t.includes("agree") || t.includes("accept") || t.includes("ok") || t.includes("हां") || t.includes("ஆம்");
        }

        async function handleSpeechAffirmation(transcript) {
            if (sessionState !== 'LISTENING') return;
            
            const text = transcript.toLowerCase();
            const isAffirmative = checkKeywords(text);
            const isNegative = text.includes("no") || text.includes("deny") || text.includes("skip") || text.includes("नहीं") || text.includes("இல்லை");

            if (isAffirmative || isNegative) {
                sessionState = 'PROCESSING';
                try { recognition.abort(); } catch(e) {}
                micBtn.classList.remove('recording');
                transcriptPreview.textContent = `"${transcript}"`;
                
                const p = allPurposes[currentIndex];
                responses[p.id] = isAffirmative;
                
                const isFinalPurpose = currentIndex === allPurposes.length - 1;
                statusLabel.textContent = "Processing Result...";

                if (isFinalPurpose) {
                    await speakPurpose("Thank you. Submitting your choices.");
                    currentIndex++; 
                    await finishInteraction();
                } else {
                    await speakPurpose("Acknowledgement received.");
                    currentIndex++;
                    setTimeout(runPurposeLoop, 200);
                }
            }
        }

        async function finishInteraction() {
            subStatus.textContent = "Finalising Artifact...";
            purposeNameEl.textContent = "COMPLIANCE SYNC";
            purposeDescEl.textContent = "Updating the immutable registry with your voice choices...";
            
            const dataPointConsents = allPurposes.map(p => ({
                data_point_id: p.id,
                consent_granted: !!responses[p.id],
                purpose_agreed_to: p.name, 
                timestamp_updated: new Date().toISOString()
            }));

            const payload = {
                _func: "record_consent",
                user_id: localStorage.getItem('tsi_dpdp_cms_principal_id') || "voice_user_" + Date.now(),
                policy_id: config.policyId,
                language_selected: "en",
                consent_mechanism: "VOICE_AFFIRMATION",
                data_point_consents: dataPointConsents
            };

            try {
                const response = await fetch(`${config.apiBase}/api/v1/client/consent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': config.cmsKey, 'X-API-Secret': config.cmsSecret },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    document.getElementById('completion-screen').classList.remove('hidden');
                } else {
                    const err = await response.json();
                    alert("Registry Sync Error: " + (err.message || "Please check server logs."));
                }
            } catch(e) { 
                alert("Network Error during sync.");
            }
        }
    </script>
</body>
</html>
