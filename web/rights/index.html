<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Privacy Dashboard — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --tsi-primary: #006A67; --tsi-dark: #0f172a; }
        body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .login-card { background: white; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); padding: 52px 48px; width: 100%; max-width: 480px; }
        .section-divider { border: none; border-top: 1px solid #f1f5f9; margin: 28px 0; }
        .section-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: #374151; margin-bottom: 8px; }
        input, select { width: 100%; padding: 13px 14px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 0.95rem; margin-bottom: 22px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; background: #fafafa; }
        input:focus, select:focus { border-color: var(--tsi-primary); box-shadow: 0 0 0 3px rgba(0,106,103,0.1); background: white; }
        .btn-primary { background-color: var(--tsi-primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 700; font-size: 1rem; transition: background 0.2s, transform 0.1s; margin-top: 6px; }
        .btn-primary:hover { background-color: #004F4C; transform: translateY(-1px); }
        .btn-primary:disabled { background-color: #94a3b8; cursor: not-allowed; transform: none; }
        .fiduciary-badge { background: #f0fdfa; border: 1px solid #99f6e4; border-radius: 10px; padding: 14px 16px; margin-bottom: 0; display: flex; align-items: center; gap: 12px; }
        .otp-hint { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: #0369a1; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 7px; padding: 8px 12px; margin: -14px 0 22px; }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-placeholder { color: #94a3b8; font-size: 0.9rem; text-align: center; padding: 16px; }
    </style>
</head>
<body>

<div class="login-card">
    <div style="text-align:center; margin-bottom: 36px;">
        <a href="https://tsicoop.org" target="_blank">
            <img src="https://tsicoop.org/logo.svg" alt="TSI Coop" style="height:44px; margin-bottom:18px;">
        </a>
        <h1 style="color:var(--tsi-dark);font-size:1.6rem;font-weight:800;margin:0 0 8px;">My Privacy Dashboard</h1>
        <p style="color:#64748b;font-size:0.9rem;margin:0;">Manage your consent and data rights</p>
    </div>

    <!-- Fiduciary section: either dropdown or badge -->
    <div class="section-label">Your Organisation</div>
    <div id="fiduciary-section">
        <div class="loading-placeholder">Loading organisations...</div>
    </div>

    <hr class="section-divider">

    <form id="login-form" style="display:none;">
        <div class="section-label">Your Credentials</div>

        <label for="user-id">Email / Mobile Number</label>
        <input type="text" id="user-id" placeholder="e.g. you@example.com or +91 98765 43210" required autocomplete="username">

        <label for="otp">One-Time Password</label>
        <input type="password" id="otp" placeholder="Enter your OTP" required autocomplete="one-time-code">

        <div class="otp-hint">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Evaluation mode — use OTP <strong style="font-family:monospace;letter-spacing:0.1em;">1234</strong> to log in.
        </div>

        <div id="login-error" style="display:none;color:#b91c1c;font-size:0.875rem;margin:0 0 18px;padding:10px 12px;background:#fef2f2;border-radius:8px;"></div>

        <button type="submit" id="login-btn" class="btn-primary">Access My Dashboard</button>
    </form>

    <p style="text-align:center;font-size:0.72rem;color:#94a3b8;margin-top:28px;line-height:1.5;">
        Your data rights are protected under the<br>Digital Personal Data Protection Act, 2023.
    </p>
</div>

<script src="portal.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const preselectedFid = params.get('fid');
    let selectedFiduciaryId = null;

    function showError(msg) {
        const el = document.getElementById('login-error');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function hideError() {
        document.getElementById('login-error').style.display = 'none';
    }

    function showForm() {
        document.getElementById('login-form').style.display = 'block';
    }

    async function loadFiduciaries() {
        const section = document.getElementById('fiduciary-section');
        try {
            const data = await publicApiCall('/api/v1/public/principal', 'list_active_fiduciaries');
            const list = Array.isArray(data) ? data : (data.data || []);

            if (preselectedFid) {
                const match = list.find(f => f.fiduciary_id === preselectedFid);
                if (!match) {
                    section.innerHTML = `<div style="color:#b91c1c;background:#fef2f2;border-radius:8px;padding:12px;font-size:0.875rem;margin-bottom:20px;">Fiduciary not found or inactive.</div>`;
                    return;
                }
                selectedFiduciaryId = preselectedFid;
                section.innerHTML = `
                    <div class="fiduciary-badge">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#006A67" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        <div>
                            <div style="font-size:0.7rem;color:#64748b;font-weight:700;text-transform:uppercase;">Organisation</div>
                            <div style="font-size:0.95rem;font-weight:700;color:#0f172a;">${esc(match.name)}</div>
                        </div>
                    </div>
                `;
            } else {
                if (list.length === 0) {
                    section.innerHTML = `<div style="color:#64748b;font-size:0.875rem;margin-bottom:20px;text-align:center;">No organisations registered yet.</div>`;
                    return;
                }
                section.innerHTML = `
                    <label for="fid-select">Select Organisation</label>
                    <select id="fid-select">
                        <option value="">— Choose your organisation —</option>
                        ${list.map(f => `<option value="${esc(f.fiduciary_id)}">${esc(f.name)}</option>`).join('')}
                    </select>
                `;
                document.getElementById('fid-select').addEventListener('change', function() {
                    selectedFiduciaryId = this.value || null;
                });
            }
            showForm();
        } catch (e) {
            section.innerHTML = `<div style="color:#b91c1c;font-size:0.875rem;margin-bottom:20px;">Could not load organisations. Please try again.</div>`;
        }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        if (!selectedFiduciaryId) {
            showError('Please select an organisation.');
            return;
        }

        const userId = document.getElementById('user-id').value.trim();
        const otp    = document.getElementById('otp').value;
        const btn    = document.getElementById('login-btn');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Verifying...';

        try {
            const res = await publicApiCall('/api/v1/public/principal', 'principal_login', {
                fiduciary_id: selectedFiduciaryId,
                user_id: userId,
                otp: otp
            });

            if (res && res.success && res.token) {
                saveSession(res);
                window.location.href = 'dashboard.html';
            } else {
                const msg = (res && res.message) ? res.message : 'Invalid OTP or account not found. Please try again.';
                showError(msg);
            }
        } catch (err) {
            showError('Network error. Please check your connection and try again.');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Access My Dashboard';
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        if (getSession()) {
            window.location.href = 'dashboard.html';
            return;
        }
        loadFiduciaries();
    });
</script>
</body>
</html>
